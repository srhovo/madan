name: Publish verified nickname mapping release

on:
  push:
    branches:
      - agent/peipei-nickname-mapping-final
    paths:
      - .github/workflows/publish-nickname-mapping-release.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout verified source branch
        uses: actions/checkout@v4
        with:
          ref: agent/peipei-nickname-mapping-final
          fetch-depth: 0

      - name: Re-run final verification
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', html, flags=re.S)
          if not scripts:
              raise SystemExit('no inline script found')
          Path('/tmp/madan-app.js').write_text('\n'.join(scripts), encoding='utf-8')
          PY
          node --check /tmp/madan-app.js
          node tests/test_nickname_mapping_stage1.mjs
          node tests/test_nickname_mapping_stage2.mjs
          node tests/test_nickname_mapping_stage3.mjs
          node tests/test_nickname_mapping_edge_cases.mjs
          git diff --check

      - name: Rebuild clean release branch with one final commit
        run: |
          source_sha=$(git rev-parse HEAD:index.html)
          git fetch origin main agent/peipei-nickname-mapping-final
          git switch -C agent/peipei-nickname-mapping-release origin/main
          git checkout origin/agent/peipei-nickname-mapping-final -- index.html
          test "$(git hash-object index.html)" = "$source_sha"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Add陪玩昵称映射库'
          git push --force origin HEAD:agent/peipei-nickname-mapping-release
