name: Export latest HTML

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
      - name: Prepare single-file HTML
        run: cp index.html '码单器8.0_昵称映射库最终版.html'
      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: madan-html
          path: '码单器8.0_昵称映射库最终版.html'
          if-no-files-found: error
